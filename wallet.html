<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoinPotli - My Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a192f; font-family: 'Segoe UI', sans-serif; color: #f1f1f1; -webkit-tap-highlight-color: transparent; }
        .royal-card { background: linear-gradient(145deg, #d4af37, #aa8a2e); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .gold-text { color: #d4af37; }
        .method-card { background: #112240; border: 1px solid #233554; transition: 0.3s; border-radius: 20px; }
        .method-card:active { border-color: #d4af37; transform: scale(0.95); }
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 4px; box-shadow: 0 0 8px #22c55e; }
        .applovin-banner { width: 100%; height: 55px; background: #112240; border: 1px dashed #d4af37/30; display: flex; align-items: center; justify-content: center; border-radius: 15px; color: #4b5563; font-size: 10px; font-weight: bold; margin: 15px 0; }
        #adOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .loader { border: 4px solid #233554; border-top: 4px solid #d4af37; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Consistent Nav Styling */
        .nav-active { color: #d4af37; border-top: 2px solid #d4af37; }
    </style>
</head>
<body class="pb-32">

    <div id="adOverlay">
        <div class="loader mb-4"></div>
        <p class="gold-text font-black tracking-widest animate-pulse">VERIFYING WALLET ASSETS...</p>
        <div id="adTimer" class="mt-4 text-white font-black text-3xl">5</div>
    </div>

    <nav class="p-4 flex justify-between items-center sticky top-0 bg-[#0a192f]/95 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='profile.html'" class="text-white text-xl"><i class="fas fa-arrow-left"></i></button>
            <h1 class="text-xl font-black gold-text uppercase tracking-tighter">My <span class="text-white">Potli</span></h1>
        </div>
        <div class="text-right">
            <p class="text-[10px] font-black text-green-500 uppercase"><span class="online-dot"></span> Secure</p>
        </div>
    </nav>

    <div class="px-5 mt-2"><div class="applovin-banner uppercase"><i class="fas fa-ad mr-2"></i> AppLovin Banner</div></div>

    <div class="p-5">
        <div class="royal-card rounded-[2.5rem] p-8 text-[#0a192f] relative overflow-hidden shadow-2xl">
            <p class="text-[11px] font-black uppercase opacity-80 mb-1">Total Redeemable Assets</p>
            <h2 class="text-4xl font-black mb-6 tracking-tight" id="totalCoinsDisplay">0 <span class="text-xl">Coins</span></h2>
            
            <div class="flex justify-between items-center bg-black/10 p-4 rounded-2xl">
                <div>
                    <p class="text-[9px] font-bold uppercase opacity-70">Exchange Value</p>
                    <p class="text-xl font-black"><span id="inrValueDisplay">0.00</span> Units</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-bold uppercase opacity-70">Payout Status</p>
                    <p class="text-[10px] font-black uppercase" id="payoutStatus">Min 10k Coins</p>
                </div>
            </div>
            <i class="fas fa-coins absolute -bottom-4 -right-2 text-black/5 text-8xl rotate-12"></i>
        </div>
    </div>

    <div class="px-5 mb-6">
        <div onclick="window.location.href='stake.html'" class="bg-[#112240] p-4 rounded-2xl border-2 border-dashed border-[#d4af37] flex justify-between items-center cursor-pointer">
            <div class="flex items-center gap-3">
                <i class="fas fa-vault gold-text text-xl"></i>
                <div>
                    <h4 class="text-[11px] font-black text-white uppercase">Stake & Earn 15% APY</h4>
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Lock coins & grow assets</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-600 text-xs"></i>
        </div>
    </div>

    <div class="px-5">
        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Withdraw To</h3>
        <div class="grid grid-cols-2 gap-3">
            <div onclick="triggerAd('UPI')" class="method-card p-5 flex flex-col items-center gap-2">
                <i class="fas fa-mobile-alt text-2xl text-blue-400"></i>
                <span class="text-[10px] font-black uppercase text-white">UPI</span>
            </div>
            <div onclick="triggerAd('Crypto')" class="method-card p-5 flex flex-col items-center gap-2">
                <i class="fab fa-bitcoin text-3xl text-yellow-500"></i>
                <span class="text-[10px] font-black uppercase text-white">Crypto</span>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#112240]/95 backdrop-blur-md border-t border-white/5 p-4 flex justify-around items-center z-50">
        <button onclick="window.location.href='dashboard.html'" class="text-gray-500 flex flex-col items-center pt-2"><i class="fas fa-home text-lg"></i><span class="text-[8px] font-black uppercase mt-1">Home</span></button>
        <button onclick="window.location.href='games.html'" class="text-gray-500 flex flex-col items-center pt-2"><i class="fas fa-gamepad text-lg"></i><span class="text-[8px] font-black uppercase mt-1">Games</span></button>
        <button onclick="window.location.href='profile.html'" class="text-gray-500 flex flex-col items-center pt-2"><i class="fas fa-user text-lg"></i><span class="text-[8px] font-black uppercase mt-1">Profile</span></button>
    </div>

    <script>
        function updateUI() {
            let coins = parseInt(localStorage.getItem("coins")) || 0;
            const displayEl = document.getElementById("totalCoinsDisplay");
            const inrEl = document.getElementById("inrValueDisplay");
            const statusEl = document.getElementById("payoutStatus");

            if(displayEl) {
                displayEl.innerHTML = coins.toLocaleString() + ' <span class="text-xl">Coins</span>';
            }
            if(inrEl) {
                inrEl.innerText = (coins / 100).toFixed(2);
            }
            if(statusEl) {
                if(coins >= 10000) {
                    statusEl.innerText = "Unlocked";
                    statusEl.className = "text-[10px] font-black uppercase text-green-500";
                } else {
                    statusEl.innerText = "Min 10k Coins";
                    statusEl.className = "text-[10px] font-black uppercase text-gray-500";
                }
            }
        }

        function triggerAd(method) {
            let coins = parseInt(localStorage.getItem("coins")) || 0;
            if(coins < 10000) {
                alert("Minimum 10,000 Coins required for " + method + " withdrawal.");
                return;
            }

            const overlay = document.getElementById('adOverlay');
            const timerEl = document.getElementById('adTimer');
            overlay.style.display = 'flex';
            
            let timeLeft = 5;
            let timer = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    overlay.style.display = 'none';
                    let addr = prompt("Enter " + method + " details for withdrawal:");
                    if(addr) alert("Request submitted! Processing takes 24-48 hours.");
                }
            }, 1000);
        }

        window.onload = updateUI;
        window.onfocus = updateUI;
    </script>
</body>
</html>
