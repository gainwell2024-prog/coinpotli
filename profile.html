<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile - CoinPotli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a192f; font-family: 'Segoe UI', sans-serif; color: #f1f1f1; -webkit-tap-highlight-color: transparent; }
        .profile-card { background: #112240; border: 1px solid #233554; border-radius: 30px; }
        .gold-text { color: #d4af37; }
        .menu-item { background: #112240; border-radius: 20px; transition: 0.3s; margin-bottom: 12px; border: 1px solid #233554; }
        .menu-item:active { transform: scale(0.98); background: #1a2a4a; }
        .applovin-banner { width: 100%; height: 50px; background: #112240; border: 1px dashed #d4af37/30; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: #4b5563; font-size: 10px; font-weight: bold; margin-bottom: 20px; }
        .dp-border { border: 3px solid #d4af37; padding: 3px; }
        /* Dashboard Jaisi Active Nav Styling */
        .nav-active { color: #d4af37; border-top: 2px solid #d4af37; }
    </style>
</head>
<body class="pb-32">

    <div class="p-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='dashboard.html'" class="text-gray-400"><i class="fas fa-chevron-left text-xl"></i></button>
            <h2 class="text-xl font-black uppercase tracking-widest text-white">My <span class="gold-text">Profile</span></h2>
        </div>
        <i class="fas fa-cog text-gray-600"></i>
    </div>

    <div class="px-5 mb-6">
        <div class="profile-card p-6 flex flex-col items-center text-center">
            <div class="relative mb-4">
                <div class="w-24 h-24 bg-[#0a192f] rounded-full dp-border overflow-hidden flex items-center justify-center">
                    <i class="fas fa-user-ninja text-4xl gold-text"></i>
                </div>
                <div class="absolute bottom-0 right-0 bg-green-500 w-6 h-6 rounded-full border-4 border-[#112240]"></div>
            </div>
            
            <div class="flex items-center gap-2 mb-1">
                <h3 class="text-2xl font-black text-white" id="userName">User_492</h3>
                <button id="editBtn" onclick="editName()" class="text-gray-500 text-xs hover:text-white"><i class="fas fa-pen"></i></button>
            </div>
            <p class="text-[9px] text-gray-500 font-black uppercase tracking-[0.2em]" id="userStatus">Verified Member</p>
        </div>
    </div>

    <div class="px-5">
        <div class="applovin-banner uppercase"><i class="fas fa-ad mr-2 text-xs"></i> Sponsored Ad</div>
    </div>

    <div class="px-5">
        <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4 px-1">Account Management</p>

        <div onclick="window.location.href='wallet.html'" class="menu-item p-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <i class="fas fa-wallet gold-text text-xl"></i>
                <div><h4 class="text-white font-black text-xs uppercase">Wallet</h4><p class="text-[8px] text-gray-500 font-bold uppercase">Balance & Withdrawal</p></div>
            </div>
            <i class="fas fa-chevron-right text-gray-600 text-[10px]"></i>
        </div>

        <div onclick="window.location.href='refer.html'" class="menu-item p-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <i class="fas fa-gift gold-text text-xl"></i>
                <div><h4 class="text-white font-black text-xs uppercase">Refer & Earn</h4><p class="text-[8px] text-gray-500 font-bold uppercase">Earn Coins Per Friend</p></div>
            </div>
            <i class="fas fa-chevron-right text-gray-600 text-[10px]"></i>
        </div>

        <div onclick="window.location.href='history.html'" class="menu-item p-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <i class="fas fa-list-ul gold-text text-xl"></i>
                <div><h4 class="text-white font-black text-xs uppercase">Potli Log</h4><p class="text-[8px] text-gray-500 font-bold uppercase">Transaction History</p></div>
            </div>
            <i class="fas fa-chevron-right text-gray-600 text-[10px]"></i>
        </div>

        <div onclick="logout()" class="menu-item p-5 flex justify-between items-center border-l-4 border-red-500/50">
            <div class="flex items-center gap-4">
                <i class="fas fa-power-off text-red-500 text-xl"></i>
                <div><h4 class="text-red-500 font-black text-xs uppercase">Logout</h4><p class="text-[8px] text-gray-600 font-bold uppercase">Exit & Clear Session</p></div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#112240]/95 backdrop-blur-md border-t border-white/5 p-4 flex justify-around items-center z-50">
        <button onclick="window.location.href='dashboard.html'" class="text-gray-500 flex flex-col items-center pt-2"><i class="fas fa-home text-lg"></i><span class="text-[8px] font-black uppercase mt-1">Home</span></button>
        <button onclick="window.location.href='games.html'" class="text-gray-500 flex flex-col items-center pt-2"><i class="fas fa-gamepad text-lg"></i><span class="text-[8px] font-black uppercase mt-1">Games</span></button>
        <button class="nav-active flex flex-col items-center pt-2"><i class="fas fa-user text-lg"></i><span class="text-[8px] font-black uppercase mt-1">Profile</span></button>
    </div>

    <script>
        function loadData() {
            const savedName = localStorage.getItem('userName') || "User_492";
            document.getElementById('userName').innerText = savedName;
            
            if(localStorage.getItem('nameEdited') === 'true') {
                document.getElementById('editBtn').style.display = 'none';
            }
        }

        function editName() {
            const newName = prompt("Enter your name (One-time edit):");
            if(newName && newName.trim().length > 2) {
                localStorage.setItem('userName', newName.trim());
                localStorage.setItem('nameEdited', 'true');
                document.getElementById('userName').innerText = newName;
                document.getElementById('editBtn').style.display = 'none';
                alert("Name saved successfully!");
            }
        }

        function logout() {
            if(confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('userName');
                localStorage.removeItem('nameEdited');
                window.location.href = 'index.html'; 
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
