<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0a192f;
    color:#fff;
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
}
#gameBox{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
}
canvas{
    background:#020617;
    border-radius:14px;
}
.ctrl{
    background:rgba(255,255,255,.1);
    padding:16px;
    border-radius:12px;
    font-size:18px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="flex justify-between items-center p-3 bg-white/5">
    <div>
        <p class="text-xs text-gray-400">Score</p>
        <p id="score" class="text-xl font-bold">0</p>
    </div>
    <div class="text-right">
        <p class="text-xs text-gray-400">Level</p>
        <p id="level" class="text-xl font-bold">1</p>
    </div>
</div>

<!-- GAME -->
<div id="gameBox">
    <canvas id="game"></canvas>
</div>

<!-- CONTROLS -->
<div class="grid grid-cols-3 gap-2 p-3">
    <div></div>
    <button class="ctrl" onclick="changeDir('UP')">⬆️</button>
    <div></div>
    <button class="ctrl" onclick="changeDir('LEFT')">⬅️</button>
    <button class="ctrl" onclick="changeDir('DOWN')">⬇️</button>
    <button class="ctrl" onclick="changeDir('RIGHT')">➡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const box = 20;

let snake, food, dir, score, level, speed, gameLoop;

/* ✅ RESIZE CANVAS TO SCREEN */
function resizeCanvas(){
    const size = Math.min(
        document.getElementById("gameBox").clientWidth,
        document.getElementById("gameBox").clientHeight
    );
    canvas.width = Math.floor(size / box) * box;
    canvas.height = Math.floor(size / box) * box;
}

function init(){
    resizeCanvas();
    snake = [{x:box*5, y:box*5}];
    food = randomFood();
    dir = "RIGHT";
    score = 0;
    level = 1;
    speed = 150;
    updateUI();
}

function randomFood(){
    return {
        x: Math.floor(Math.random()*(canvas.width/box))*box,
        y: Math.floor(Math.random()*(canvas.height/box))*box
    };
}

function draw(){
    ctx.fillStyle="#020617";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    snake.forEach((part,i)=>{
        ctx.fillStyle = i===0 ? "#d4af37" : "#2563eb";
        ctx.fillRect(part.x, part.y, box, box);
    });

    ctx.fillStyle="#ef4444";
    ctx.fillRect(food.x, food.y, box, box);

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(dir==="LEFT") headX -= box;
    if(dir==="RIGHT") headX += box;
    if(dir==="UP") headY -= box;
    if(dir==="DOWN") headY += box;

    if(headX === food.x && headY === food.y){
        score += 10;

        if(score % 50 === 0){
            level++;
            speed = Math.max(60, speed - 10);
            clearInterval(gameLoop);
            gameLoop = setInterval(draw, speed);
        }

        food = randomFood();
    } else {
        snake.pop();
    }

    const newHead = {x:headX, y:headY};

    if(
        headX < 0 || headY < 0 ||
        headX >= canvas.width || headY >= canvas.height ||
        snake.some(p => p.x === newHead.x && p.y === newHead.y)
    ){
        gameOver();
        return;
    }

    snake.unshift(newHead);
    updateUI();
}

function updateUI(){
    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
}

function gameOver(){
    clearInterval(gameLoop);
    alert("Game Over!\nScore: " + score);
    location.reload();
}

function changeDir(d){
    if(d==="LEFT" && dir!=="RIGHT") dir="LEFT";
    if(d==="RIGHT" && dir!=="LEFT") dir="RIGHT";
    if(d==="UP" && dir!=="DOWN") dir="UP";
    if(d==="DOWN" && dir!=="UP") dir="DOWN";
}

document.addEventListener("keydown", e=>{
    if(e.key==="ArrowLeft") changeDir("LEFT");
    if(e.key==="ArrowRight") changeDir("RIGHT");
    if(e.key==="ArrowUp") changeDir("UP");
    if(e.key==="ArrowDown") changeDir("DOWN");
});

/* AUTO START */
window.addEventListener("load", () => {
    init();
    gameLoop = setInterval(draw, speed);
});
</script>

</body>
</html>
