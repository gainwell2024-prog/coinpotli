<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dashboard - CoinPotli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { background: #060d1a; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        
        .app-container {
            width: 100%; max-width: 425px; height: 100%; margin: 0 auto;
            background: radial-gradient(circle at top, #1a2a4a 0%, #0a192f 100%);
            display: flex; flex-direction: column; position: relative;
        }

        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        
        .royal-card { background: linear-gradient(135deg, #d4af37 0%, #f1d572 50%, #aa8a2e 100%); }
        .engine-card { background: rgba(17, 34, 64, 0.6); border: 1px solid rgba(212,175,55,0.15); }
        .nav-fixed { position: absolute; bottom: 0; width: 100%; max-width: 425px; background: #0a192f; border-top: 1px solid rgba(255,255,255,0.1); }
        .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #d4af37, #f1d572); transition: width 1s linear; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Scrollable Content -->
        <div class="scroll-area">
            <nav class="p-5 flex justify-between items-center bg-[#0a192f]/95 backdrop-blur-md z-40">
                <h1 class="text-2xl font-black text-[#d4af37] uppercase tracking-tighter">Coin<span class="text-white">Potli</span></h1>
                <div class="flex items-center bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
                    <span class="text-[9px] font-black uppercase text-white/80" id="userNameHeader">Player</span>
                </div>
            </nav>

            <!-- Profile Alert -->
            <div id="profileAlertBanner" class="hidden px-5 mb-4">
                <div class="bg-orange-500/10 border border-orange-500/30 rounded-2xl p-4">
                    <input type="text" id="newUsernameInput" placeholder="ENTER USERNAME" class="w-full bg-black/40 rounded-xl px-3 py-2 text-[10px] text-white uppercase border border-white/10 mb-2">
                    <button onclick="saveUsername()" class="w-full bg-orange-500 text-white font-black text-[10px] py-2 rounded-xl uppercase">Update Profile</button>
                </div>
            </div>

            <!-- Balance Card -->
            <div class="px-5 mb-4">
                <div class="royal-card rounded-[2.5rem] p-6 text-[#0a192f] shadow-2xl">
                    <p class="text-[11px] font-black uppercase opacity-80">Potli Balance</p>
                    <h2 class="text-4xl font-black mb-4 tracking-tight"><span id="totalCoins">0</span></h2>
                    <div class="flex justify-between items-center bg-black/10 p-3 rounded-2xl">
                        <p class="text-[9px] font-bold opacity-70 uppercase">Convertible Value: ₹<span id="inrValue">0.00</span></p>
                        <button class="bg-[#0a192f] text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase">Withdraw</button>
                    </div>
                </div>
            </div>

            <!-- Miner Station -->
            <div class="px-5 mb-6">
                <h3 class="text-[10px] font-black text-gray-400 uppercase mb-3">Auto-Miner Station</h3>
                <div class="engine-card p-5 rounded-[2rem]">
                    <h4 class="text-white font-black text-xs uppercase">Core Multi-Miner</h4>
                    <div class="w-full h-1.5 bg-black/40 rounded-full overflow-hidden my-3">
                        <div id="minerProgress" class="progress-bar-fill"></div>
                    </div>
                    <span id="cycleTimerDisplay" class="text-xs font-black text-white">10s</span>
                </div>
            </div>

            <!-- Ad Space -->
            <div class="w-full flex justify-center px-5">
                <div class="w-[320px] h-[50px] bg-black/40 rounded-xl border border-white/5 flex items-center justify-center">
                    <span class="text-[8px] text-gray-600 font-black uppercase">Ad Zone (320x50)</span>
                </div>
            </div>
        </div>

        <!-- Fixed Footer -->
        <div class="nav-fixed p-3 flex justify-around items-center">
            <button class="text-[#d4af37] flex flex-col items-center">
                <i class="fas fa-home text-base"></i>
                <span class="text-[8px] font-black uppercase mt-1">Home</span>
            </button>
            <button onclick="window.location.href='games.html'" class="text-gray-500 flex flex-col items-center">
                <i class="fas fa-gamepad text-base"></i>
                <span class="text-[8px] font-black uppercase mt-1">Games</span>
            </button>
            <button onclick="window.location.href='profile.html'" class="text-gray-500 flex flex-col items-center">
                <i class="fas fa-user text-base"></i>
                <span class="text-[8px] font-black uppercase mt-1">Profile</span>
            </button>
        </div>
    </div>

    <script>
        // ... (Keep existing JS logic same, just ensure updateUI calls are active)
        function updateUI() {
            document.getElementById("totalCoins").innerText = (localStorage.getItem("coins") || 0);
            checkUserProfileState();
        }
        function checkUserProfileState() {
            let userObj = JSON.parse(localStorage.getItem("coinpotli_test_user")) || {};
            let name = userObj.name || "Player";
            document.getElementById("userNameHeader").innerText = name;
            document.getElementById("profileAlertBanner").classList.toggle("hidden", name !== "Demo FirePlayer");
        }
        function saveUsername() {
            let name = document.getElementById("newUsernameInput").value;
            let userObj = JSON.parse(localStorage.getItem("coinpotli_test_user")) || {};
            userObj.name = name;
            localStorage.setItem("coinpotli_test_user", JSON.stringify(userObj));
            updateUI();
        }
        window.onload = updateUI;
    </script>
</body>
</html>
