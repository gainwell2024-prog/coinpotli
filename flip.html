<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bottle Flip - CoinPotli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0a192f; color: #f1f1f1; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; padding: 10px; }
        
        .gold-text { color: #d4af37; }
        .royal-card { background: linear-gradient(145deg, #112240, #0a192f); border: 1px solid rgba(212,175,55,0.2); }

        #game-container { flex: 1; position: relative; background: linear-gradient(#1e3a8a, #0a192f); border-bottom: 15px solid #d4af37; border-radius: 20px; overflow: hidden; cursor: pointer; }
        
        #bottle { 
            width: 32px; height: 80px; 
            background: #3b82f6; border: 3px solid #fff; 
            position: absolute; bottom: 0; left: 50%; 
            transform: translateX(-50%); border-radius: 8px 8px 4px 4px; 
            transition: all 0.6s cubic-bezier(0.33, 1, 0.68, 1); 
            z-index: 10;
        }
        #bottle::before { content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 14px; height: 10px; background: #fff; border-radius: 2px; }
        
        .platform { 
            width: 120px; height: 12px; background: #d4af37; 
            position: absolute; bottom: 180px; left: 50%; 
            transform: translateX(-50%); border-radius: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        #endPopup, #adOverlay { display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        #adOverlay { background: rgba(0,0,0,0.98); flex-direction: column; }
        #endPopup { background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .v-progress { height: 100%; background: #d4af37; width: 0%; transition: linear; }
        .pulse-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 4px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body onclick="handleFlip()">

    <div id="adOverlay" onclick="event.stopPropagation()">
        <div class="w-12 h-12 border-4 border-white/5 border-t-gold-text rounded-full animate-spin mb-4"></div>
        <p class="gold-text font-black tracking-widest uppercase text-[10px]">Processing Bottle Rewards...</p>
        <div id="adTimerOverlay" class="mt-2 text-white font-black text-5xl">5</div>
    </div>

    <nav class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
            <button onclick="window.location.href='games.html'; event.stopPropagation();" class="text-white"><i class="fas fa-arrow-left"></i></button>
            <h1 class="text-xs font-black gold-text italic tracking-tighter uppercase">Bottle Flip Pro</h1>
        </div>
        <div class="flex items-center gap-2">
            <div class="bg-white/5 px-2 py-1 rounded-lg border border-white/10 flex items-center">
                <span class="pulse-dot"></span>
                <p class="text-[8px] font-black text-green-500 uppercase">Server Active</p>
            </div>
            <p id="liveCount" class="text-[9px] font-bold text-gray-500 italic">74,250 Online</p>
        </div>
    </nav>

    <div class="h-8 bg-white/5 border border-dashed border-white/10 rounded-lg flex items-center justify-center text-[8px] text-gray-600 uppercase tracking-widest mb-2 font-bold">
        <i class="fas fa-ad mr-2"></i> Sponsored Advertisement
    </div>

    <div class="flex justify-between items-center px-4 py-3 mb-3 bg-white/5 rounded-2xl border border-white/5">
        <div>
            <span class="text-[7px] text-gray-500 font-bold uppercase block mb-1">Potli Reward</span>
            <div class="flex items-center gap-1.5 leading-none">
                <i class="fas fa-coins gold-text text-xs"></i>
                <span id="rewardDisplay" class="text-lg font-black text-white">0</span>
            </div>
        </div>
        <div class="text-center">
            <span class="text-[7px] text-gray-500 font-bold uppercase block mb-1">Timer</span>
            <div id="timer" class="text-lg font-black text-white">50s</div>
        </div>
        <div class="text-right">
            <span class="text-[7px] text-gray-500 font-bold uppercase block mb-1">Chances</span>
            <div id="chanceText" class="text-lg font-black text-green-400">50/50</div>
        </div>
    </div>

    <div id="game-container">
        <div class="platform"></div>
        <div id="bottle"></div>
        <div id="msg" class="absolute w-full text-center bottom-40 font-black text-4xl hidden uppercase italic tracking-widest z-20"></div>
    </div>

    <div id="endPopup" onclick="event.stopPropagation()">
        <div class="w-full max-w-xs royal-card p-8 rounded-[3rem] text-center border-2 border-gold-btn/30 shadow-2xl">
            <div id="syncSection">
                <i class="fas fa-clock gold-text text-4xl mb-3"></i>
                <h2 class="text-xl font-black uppercase italic text-white">Time Expired</h2>
                <div class="my-5 bg-white/5 py-4 rounded-3xl border border-white/5 px-6">
                    <div class="h-1 bg-white/5 rounded-full overflow-hidden">
                        <div id="vProgress" class="v-progress"></div>
                    </div>
                    <p id="syncMsg" class="text-[7px] text-gray-500 uppercase mt-2 font-black">Syncing Rewards...</p>
                </div>
            </div>

            <div id="resultSection" class="hidden">
                <i class="fas fa-crown gold-text text-5xl mb-3"></i>
                <h2 class="text-2xl font-black uppercase text-white" id="finalCoinText">0 Coins</h2>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-6">Added to your Potli</p>
                <div class="space-y-2">
                    <button onclick="playAgainWithAd()" class="w-full py-4 rounded-xl font-black uppercase text-xs" style="background: linear-gradient(135deg, #d4af37, #aa8a2e); color: #0a192f;">Play Again</button>
                    <button onclick="window.location.href='games.html'" class="w-full bg-white/5 text-white py-3 rounded-xl font-black uppercase text-[10px] border border-white/10">More Games</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let timeLeft = 50;
        let chances = 50;
        let successFlips = 0;
        let isFlipping = false;
        let gameActive = true;

        const bottle = document.getElementById('bottle');
        const msg = document.getElementById('msg');
        const liveCountEl = document.getElementById('liveCount');

        // Fake Player Counter (70K - 90K)
        setInterval(() => {
            const count = Math.floor(Math.random() * (90000 - 70000 + 1)) + 70000;
            liveCountEl.innerText = `${count.toLocaleString()} Online`;
        }, 5000);

        // Timer Logic
        const timerInt = setInterval(() => {
            if (!gameActive) return;
            timeLeft--;
            document.getElementById('timer').innerText = `${timeLeft}s`;
            if (timeLeft <= 0) endGame();
        }, 1000);

        function handleFlip() {
            if (isFlipping || !gameActive || chances <= 0) return;
            isFlipping = true;
            chances--;
            document.getElementById('chanceText').innerText = `${chances}/50`;

            // 57% Success Chance
            let isSuccess = Math.random() < 0.57;

            bottle.style.transition = "all 0.6s cubic-bezier(0.33, 1, 0.68, 1)";
            bottle.style.bottom = "260px";
            bottle.style.transform = "translateX(-50%) rotate(360deg)";

            setTimeout(() => {
                if (isSuccess) {
                    successFlips++;
                    bottle.style.bottom = "192px"; 
                    bottle.style.transform = "translateX(-50%) rotate(360deg)";
                    showMsg("PERFECT", "text-green-400");
                    
                    document.getElementById('rewardDisplay').innerText = successFlips * 10;
                    if (chances <= 0) endGame();
                    else setTimeout(() => { if (gameActive) resetBottle(); }, 800);
                } else {
                    // MISS: Extra .75s delay (Total ~1.5s penalty)
                    bottle.style.bottom = "0px";
                    bottle.style.transform = "translateX(-50%) rotate(180deg)";
                    showMsg("MISS", "text-red-500");
                    
                    if (chances <= 0) endGame();
                    else setTimeout(() => { if (gameActive) resetBottle(); }, 1550); // Increased Delay
                }
            }, 500);
        }

        function showMsg(text, colorClass) {
            msg.innerText = text;
            msg.className = `absolute w-full text-center bottom-40 font-black text-4xl uppercase italic z-20 ${colorClass}`;
            msg.style.display = "block";
            setTimeout(() => msg.style.display = "none", 600);
        }

        function resetBottle() {
            bottle.style.transition = "none";
            bottle.style.bottom = "0";
            bottle.style.transform = "translateX(-50%) rotate(0deg)";
            setTimeout(() => {
                bottle.style.transition = "all 0.6s cubic-bezier(0.33, 1, 0.68, 1)";
                isFlipping = false;
            }, 50);
        }

        function endGame() {
            if(!gameActive) return;
            gameActive = false;
            clearInterval(timerInt);
            let totalWin = successFlips * 10;
            document.getElementById("endPopup").style.display = "flex";
            document.getElementById("finalCoinText").innerText = totalWin + " Coins";
            
            const progress = document.getElementById('vProgress');
            progress.style.transition = "4s linear";
            setTimeout(() => progress.style.width = "100%", 50);

            setTimeout(() => {
                let current = (parseInt(localStorage.getItem('coins')) || 0) + totalWin;
                localStorage.setItem('coins', current);
                document.getElementById('syncSection').classList.add('hidden');
                document.getElementById('resultSection').classList.remove('hidden');
            }, 4050);
        }

        function playAgainWithAd() {
            document.getElementById('adOverlay').style.display = 'flex';
            let left = 5;
            let int = setInterval(() => {
                left--; document.getElementById('adTimerOverlay').innerText = left;
                if(left <= 0) { clearInterval(int); location.reload(); }
            }, 1000);
        }
    </script>
</body>
</html>
