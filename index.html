<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - CoinPotli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        body { background: radial-gradient(circle at top, #1a2a4a 0%, #0a192f 100%); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        .glass-card { background: rgba(17, 34, 64, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(212,175,55,0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f1d572 50%, #aa8a2e 100%); color: #0a192f; }
        .flag-icon { width: 16px; height: 11px; display: inline-block; background: linear-gradient(#FF9933, #FFF, #128807); border-radius: 1px; margin-right: 5px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <div class="text-center mb-8">
        <div class="w-20 h-20 gold-btn rounded-[2rem] mx-auto flex items-center justify-center shadow-[0_0_40px_rgba(212,175,55,0.2)] mb-4">
            <i class="fas fa-coins text-3xl"></i>
        </div>
        <h1 class="text-3xl font-black text-white tracking-tighter uppercase italic">Coin<span class="text-[#d4af37]">Potli</span></h1>
        <div class="flex items-center justify-center mt-2 opacity-80">
            <span class="flag-icon"></span>
            <p class="text-[9px] text-gray-300 font-bold uppercase tracking-[0.2em]">India's Most Trusted Earning Platform</p>
        </div>
    </div>

    <div class="w-full max-w-sm glass-card rounded-[3rem] p-10">
        <div class="space-y-6">
            <div class="text-center">
                <h2 class="text-white font-black text-base uppercase tracking-widest">Sign In / Sign Up</h2>
                <p class="text-gray-500 text-[9px] font-bold mt-1">SECURE 1-CLICK INSTANT ACCESS</p>
            </div>

            <button onclick="continueWithGoogle()" class="w-full gold-btn py-4 rounded-2xl font-black uppercase tracking-[0.1em] text-xs shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="fab fa-google text-sm"></i> Continue with Google
            </button>

            <p class="text-[9px] text-center text-gray-400 font-bold uppercase">No OTP Required • 100% Free & Secure</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAJktqT5BuUFUqW6OC-TtVLAP9LhgbQodY",
            authDomain: "cpin-4cca9.firebaseapp.com",
            projectId: "cpin-4cca9",
            storageBucket: "cpin-4cca9.firebasestorage.app",
            messagingSenderId: "790141628965",
            appId: "1:790141628965:web:6e6a8d465a095c626585cc"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function continueWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
            .then((result) => {
                const user = result.user;
                const userDocRef = db.collection("users").doc(user.uid);

                userDocRef.get().then((doc) => {
                    if (!doc.exists) {
                        userDocRef.set({
                            uid: user.uid,
                            name: user.displayName || "Player",
                            email: user.email,
                            coins: 0,
                            energy: 15, 
                            lastEnergyUpdate: firebase.firestore.FieldValue.serverTimestamp(),
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        }).then(() => {
                            enterDashboard();
                        });
                    } else {
                        enterDashboard();
                    }
                });
            })
            .catch((error) => {
                console.error("Auth Error: ", error);
                alert("Login failed: " + error.message);
            });
        }

        function enterDashboard() {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
