<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login - CoinPotli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Real Firebase Compatibility SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        html, body { 
            background: #060d1a; 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container {
            width: 100%;
            max-width: 425px; 
            height: 100%;
            max-height: 900px; 
            background: radial-gradient(circle at top, #1a2a4a 0%, #0a192f 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5rem 1.5rem;
            box-sizing: border-box;
            position: relative;
        }

        @media (min-width: 426px) {
            .app-container {
                border-radius: 40px;
                height: 85vh;
                border: 4px solid rgba(212, 175, 55, 0.2);
                box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            }
        }

        .glass-card { 
            background: rgba(17, 34, 64, 0.6); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212,175,55,0.15); 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); 
        }
        
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f1d572 50%, #aa8a2e 100%); color: #0a192f; }
        .flag-icon { width: 16px; height: 11px; display: inline-block; background: linear-gradient(#FF9933, #FFF, #128807); border-radius: 1px; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Brand Logo Section -->
        <div class="text-center mt-4">
            <div class="w-20 h-20 gold-btn rounded-[2rem] mx-auto flex items-center justify-center shadow-[0_0_40px_rgba(212,175,55,0.2)] mb-4 animate-bounce" style="animation-duration: 3s;">
                <i class="fas fa-coins text-3xl"></i>
            </div>
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic">Coin<span class="text-[#d4af37]">Potli</span></h1>
            <div class="flex items-center justify-center mt-2 opacity-80">
                <span class="flag-icon"></span>
                <p class="text-[9px] text-gray-300 font-black uppercase tracking-[0.2em]">India's Most Trusted Rewards Hub</p>
            </div>
        </div>

        <!-- Google Login Card Frame -->
        <div class="w-full glass-card rounded-[2.5rem] p-6 mb-4">
            <div id="loginSection" class="space-y-4">
                <div class="text-center">
                    <h2 class="text-white font-black text-xs uppercase tracking-widest">Sign In / Sign Up</h2>
                    <p id="loadingStatus" class="text-gray-500 text-[9px] font-bold mt-1">SECURE 1-CLICK INSTANT ACCESS</p>
                </div>
                
                <!-- Main Login Trigger Button -->
                <button id="loginBtn" onclick="continueWithGoogle()" class="w-full gold-btn py-4 rounded-2xl font-black uppercase tracking-[0.1em] text-xs shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i class="fab fa-google text-sm"></i> Continue with Google
                </button>

                <!-- Premium Referral Code Box -->
                <div class="pt-2">
                    <div class="relative bg-black/30 rounded-xl border border-white/5 p-1 flex items-center">
                        <span class="text-gray-500 pl-3 text-xs"><i class="fas fa-user-plus"></i></span>
                        <input type="text" id="referCodeInput" placeholder="REFER CODE (OPTIONAL)" class="w-full bg-transparent text-white text-xs font-black uppercase tracking-widest px-3 py-2 focus:outline-none placeholder-gray-600">
                    </div>
                </div>
            </div>
        </div>

        <!-- Safety Footer Area Labels -->
        <div class="text-center space-y-1 pb-2">
            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-wider">No Investment Required • 100% Free Play to Earn</p>
            <p class="text-[8px] text-gray-600 font-medium">V1.0.2 • © CoinPotli Network Inc.</p>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAJktqT5BuUFUqW6OC-TtVlAP9LhgbQodY",
            authDomain: "cpin-4cca9.firebaseapp.com",
            projectId: "cpin-4cca9",
            storageBucket: "cpin-4cca9.firebasestorage.app",
            messagingSenderId: "790141628965",
            appId: "1:790141628965:web:6e6a8d465a095c626585cc"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isProcessing = false; // Master lock to completely terminate reload loops

        // URL parsing and handling redirect outcomes sequentially
        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                const inputField = document.getElementById('referCodeInput');
                if(inputField) {
                    inputField.value = refCode.toUpperCase();
                    inputField.disabled = true; 
                    inputField.style.opacity = "0.6";
                }
            }
            
            // Execute redirect resolution immediately on load
            await checkRedirectResult();
        }

        // Global Session Observer: Processes data only if no active sync is running
        auth.onAuthStateChanged(async (user) => {
            if (user && !isProcessing) {
                console.log("Observer detected login session.");
                await handleUserFlow(user);
            }
        });

        function continueWithGoogle() {
            if (isProcessing) return;
            
            const enteredReferCode = document.getElementById('referCodeInput').value.trim().toUpperCase();
            const statusLabel = document.getElementById('loadingStatus');
            const loginBtn = document.getElementById('loginBtn');

            if (statusLabel) statusLabel.innerText = "CONNECTING GOOGLE GATEWAY...";
            if (loginBtn) {
                loginBtn.disabled = true;
                loginBtn.style.opacity = "0.5";
            }

            if(enteredReferCode) {
                localStorage.setItem("temp_pending_ref", enteredReferCode);
            }

            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }

        async function checkRedirectResult() {
            try {
                const result = await auth.getRedirectResult();
                if (result && result.user && !isProcessing) {
                    console.log("Redirect result loaded successfully.");
                    await handleUserFlow(result.user);
                }
            } catch (error) {
                console.error("Redirect flow caught an error:", error);
                resetLoginButton("LOGIN FAILED. RETRY AGAIN.");
                alert("Authentication issue: " + error.message);
            }
        }

        // Centralized structural gateway for data sync and registration
        async function handleUserFlow(user) {
            if (isProcessing) return;
            isProcessing = true; // Engage master lock

            const statusLabel = document.getElementById('loadingStatus');
            if (statusLabel) statusLabel.innerText = "VERIFYING SECURE CLOUD...";

            try {
                const userRef = db.collection("users").doc(user.uid);
                const doc = await userRef.get();

                if (doc.exists) {
                    const existingData = doc.data();

                    // ANTI-CHEAT BLOCKER
                    if (existingData.isBanned === true) {
                        alert("⚠️ YOUR ACCOUNT IS BANNED FOR CHEATING!");
                        await auth.signOut();
                        resetLoginButton("ACCOUNT BANNED");
                        isProcessing = false;
                        return;
                    }

                    localStorage.setItem("coinpotli_test_user", JSON.stringify({ name: existingData.username, balance: existingData.balance }));
                } else {
                    // Fresh account cloud allocation logic
                    const savedRefCode = localStorage.getItem("temp_pending_ref") || "NONE";
                    const cleanUsername = user.displayName ? "CP#" + user.displayName.split(' ')[0].toUpperCase() : "CP#PLAYER";
                    const generatedReferCode = "POTLI" + user.uid.substring(0, 5).toUpperCase();

                    const freshUserData = {
                        uid: user.uid,
                        username: cleanUsername,
                        balance: 500, // Welcome Bonus
                        referral_code: generatedReferCode,
                        referred_by: savedRefCode,
                        isBanned: false, // Default status
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    await userRef.set(freshUserData);
                    localStorage.setItem("coinpotli_test_user", JSON.stringify({ name: cleanUsername, balance: 500 }));
                    localStorage.removeItem("temp_pending_ref");
                }

                localStorage.setItem("coinpotli_sync_ts_" + user.uid, Date.now());
                if (statusLabel) statusLabel.innerText = "ACCESS GRANTED! REDIRECTING...";
                
                // Break out from the index loop entirely by pushing state to dashboard
                enterDashboard();

            } catch (e) {
                console.error("Firestore transaction failed:", e);
                resetLoginButton("DATABASE ERROR. RETRY.");
                isProcessing = false; // Release lock only to let user retry on hard database network drops
            }
        }

        function resetLoginButton(msg) {
            const statusLabel = document.getElementById('loadingStatus');
            const loginBtn = document.getElementById('loginBtn');
            if (statusLabel) statusLabel.innerText = msg;
            if (loginBtn) {
                loginBtn.disabled = false;
                loginBtn.style.opacity = "1";
            }
        }

        function enterDashboard() {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
