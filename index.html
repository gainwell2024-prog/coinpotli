<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CoinPotli - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase Legacy/Compat SDKs (Easy to use in single HTML file) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        html, body { background: #060d1a; margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; color: white; }
        .app-container { width: 100%; max-width: 425px; min-height: 100vh; margin: 0 auto; background: radial-gradient(circle at top, #1a2a4a 0%, #0a192f 100%); display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div class="app-container p-5">
        <!-- Header Nav -->
        <nav class="flex items-center justify-between bg-[#0a192f]/95 backdrop-blur-md py-4 border-b border-white/5 mb-6">
            <div>
                <h1 class="text-xl font-black uppercase tracking-tight">Coin<span class="text-[#d4af37]">Potli</span></h1>
                <p id="userEmailDisplay" class="text-[10px] text-gray-400">Loading account...</p>
            </div>
            <div class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl flex items-center gap-2">
                <i class="fas fa-coins text-[#d4af37] text-sm"></i>
                <!-- UI Balance Element -->
                <span id="headerUserBalance" class="text-sm font-black text-white">0</span>
            </div>
        </nav>

        <!-- Test Simulation Section -->
        <div class="bg-white/5 border border-white/10 rounded-2xl p-5 text-center mb-6">
            <h3 class="font-bold text-sm mb-2">Test Coin Earning</h3>
            <p class="text-xs text-gray-400 mb-4">Niche buttons par click karke coins earn karo. UI par instantly badhega, par Firebase par load nahi padega.</p>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="simulateEarning(100)" class="bg-amber-500 hover:bg-amber-600 text-black font-black text-xs py-3 rounded-xl active:scale-95 transition">
                    +100 Coins
                </button>
                <button onclick="simulateEarning(500)" class="bg-yellow-500 hover:bg-yellow-600 text-black font-black text-xs py-3 rounded-xl active:scale-95 transition">
                    +500 Coins
                </button>
            </div>
        </div>

        <!-- Sync Status Logs for Testing -->
        <div class="bg-black/30 border border-white/5 rounded-2xl p-4">
            <h4 class="text-[10px] uppercase font-black tracking-wider text-gray-400 mb-2">Live System Status</h4>
            <div id="statusLogs" class="text-[11px] text-emerald-400 font-mono space-y-1">
                <div>System initialized...</div>
            </div>
        </div>
        
        <!-- Logout Button -->
        <button onclick="handleLogout()" class="mt-auto mb-4 w-full bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition">
            Log Out Account
        </button>
    </div>

    <!-- CORE JAVASCRIPT LOGIC -->
    <script>
        // ==========================================
        // 1. FIREBASE INITIALIZATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Global Application State
        let userObj = {
            uid: null,
            email: null,
            balance: 0
        };
        
        let inactivityTimer;
        const ONE_HOUR = 60 * 60 * 1000; // 1 Hour Milliseconds me
        const INACTIVITY_LIMIT = 5 * 60 * 1000; // 5 Minutes Inactivity limit

        // ==========================================
        // 2. GMAIL AUTH DETECTION (ALL DEVICES SYNC)
        // ==========================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // PC aur Mobile par agar same Gmail hai, toh same UID yahan detect hogi
                userObj.uid = user.uid;
                userObj.email = user.email;
                
                document.getElementById('userEmailDisplay').innerText = user.email;
                logStatus("Logged in successfully. Syncing database...");

                // Database se latest balance load karein (Jo PC par earn kiya tha wo mobile par aa jayega)
                await loadDataFromFirebase();
                
                // Active user event listeners start karein (Inactivity check karne ke liye)
                startInactivityTracker();
            } else {
                logStatus("No session found. Redirecting to login...");
                // Agar login nahi hai toh login page par bhejne ke liye niche wali line uncomment karein:
                // window.location.href = "login.html";
            }
        });

        // Firebase se fresh data pull karna (Only on app load)
        async function loadDataFromFirebase() {
            try {
                let doc = await db.collection("users").doc(userObj.uid).get();
                if (doc.exists) {
                    userObj.balance = doc.data().balance || 0;
                    logStatus(`Data fetched from cloud. Balance: ${userObj.balance}`);
                } else {
                    // New user initialization
                    userObj.balance = 0;
                    await db.collection("users").doc(userObj.uid).set({ balance: userObj.balance });
                    logStatus("New user profile created on Firebase.");
                }
                updateUI();
            } catch (error) {
                console.error("Error loading data:", error);
                logStatus("Failed to fetch cloud data. Using backup.");
            }
        }

        // ==========================================
        // 3. COIN EARNING & LOCAL BUFFER LOGIC
        // ==========================================
        function simulateEarning(amount) {
            if (!userObj.uid) return;

            // Step A: Screen par balance instantly badhao (Real-time update)
            userObj.balance += amount;
            updateUI();
            logStatus(`Earned +${amount} locally. (UI Updated)`);

            // Step B: LocalStorage me backup data rakho taaki sudden app crash pe safe rahe
            localStorage.setItem("coinpotli_backup_bal_" + userObj.uid, userObj.balance);

            // Step C: Check karein kya 1 ghanta ho gaya database update ko?
            checkPeriodicSync();
        }

        // ==========================================
        // 4. SMART FIREBASE SYNC CONTROLLER (LOAD SAVER)
        // ==========================================
        
        // Condition 1: Har 1 Ghante me Auto Sync Check
        function checkPeriodicSync() {
            const now = Date.now();
            const lastSync = localStorage.getItem("coinpotli_last_sync_" + userObj.uid) || 0;

            if (now - lastSync >= ONE_HOUR) {
                logStatus("1 Hour threshold reached! Triggering periodic sync...");
                syncToFirebase();
            }
        }

        // Main Firebase Write Function (Jo single hit me load save karega)
        async function syncToFirebase() {
            if (!userObj.uid) return;

            try {
                // Poore 1 ghante ka cumulative balance ek hi baar database me update hoga
                await db.collection("users").doc(userObj.uid).update({
                    balance: userObj.balance,
                    lastSyncedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                localStorage.setItem("coinpotli_last_sync_" + userObj.uid, Date.now());
                logStatus("--> Firebase cloud database synced successfully!");
            } catch (error) {
                console.error("Firebase sync error:", error);
                logStatus("Sync deferred due to network/error.");
            }
        }

        // Condition 2: Tab/Browser Close hone par auto-save logic
        window.onbeforeunload = function() {
            if (userObj.uid) {
                // Browser ya tab close hote hi instant data update command
                syncToFirebase();
            }
        };

        // Condition 3: User Inactive (Idle) hone par auto sync logic
        function startInactivityTracker() {
            // Jab user screen par touch kare ya mouse ghumaye toh timer reset ho jaye
            window.onload = resetInactivityTimer;
            document.onmousemove = resetInactivityTimer;
            document.onkeypress = resetInactivityTimer;
            document.ontouchstart = resetInactivityTimer;
            document.onclick = resetInactivityTimer;
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            // Agar user 5 minute tak screen touch nahi karta
            inactivityTimer = setTimeout(function() {
                logStatus("User detected inactive for 5 mins. Syncing background data...");
                syncToFirebase();
            }, INACTIVITY_LIMIT);
        }

        // ==========================================
        // 5. HELPER FUNCTIONS
        // ==========================================
        function updateUI() {
            document.getElementById('headerUserBalance').innerText = userObj.balance.toLocaleString();
        }

        function logStatus(message) {
            const logsContainer = document.getElementById("statusLogs");
            const time = new Date().toLocaleTimeString();
            logsContainer.innerHTML += `<div>[${time}] ${message}</div>`;
            // Auto scroll to bottom
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        function handleLogout() {
            // Logout karne se pehle data save karna zaroori hai
            syncToFirebase().then(() => {
                auth.signOut().then(() => {
                    localStorage.clear();
                    alert("Logged out!");
                    location.reload();
                });
            });
        }

        // Har 5 minute me background automatic checker run karein
        setInterval(checkPeriodicSync, 5 * 60 * 1000);
    </script>
</body>
</html>
