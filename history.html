<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Potli Log - CoinPotli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a192f; font-family: 'Segoe UI', sans-serif; color: #f1f1f1; }
        .glass-header { background: rgba(17, 34, 64, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .trans-card { background: #112240; border: 1px solid #233554; border-radius: 18px; }
        .gold-text { color: #d4af37; }
        .plus { color: #22c55e; }
        .minus { color: #ef4444; }
        .ad-slot { background: rgba(212, 175, 55, 0.05); border: 1px dashed rgba(212, 175, 55, 0.2); border-radius: 15px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #4b5563; text-transform: uppercase; letter-spacing: 2px; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="pb-10">

    <div class="sticky top-0 z-50 glass-header p-5 flex items-center gap-4">
        <button onclick="window.location.href='profile.html'" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 active:scale-90 transition">
            <i class="fas fa-chevron-left text-white"></i>
        </button>
        <div>
            <h1 class="text-xl font-black uppercase tracking-tight">Potli <span class="gold-text">Log</span></h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest italic">History of your earnings</p>
        </div>
    </div>

    <div class="p-5">
        <div class="bg-gradient-to-br from-[#112240] to-[#0a192f] p-6 rounded-[2.5rem] border border-[#d4af37]/30 flex justify-between items-center shadow-2xl">
            <div>
                <p class="text-[9px] font-black uppercase text-gray-400 mb-1">Total Potli Balance</p>
                <div class="flex items-center gap-2">
                    <i class="fas fa-coins gold-text text-xl"></i>
                    <h2 id="historyBalance" class="text-3xl font-black">0</h2>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[8px] font-black text-gray-500 uppercase">Status</p>
                <p class="text-[10px] font-black text-green-500 uppercase tracking-tighter">Verified Account</p>
            </div>
        </div>
    </div>

    <div class="px-5 space-y-4" id="transactionList">
        </div>

    <script>
        function loadHistory() {
            const container = document.getElementById('transactionList');
            const balance = localStorage.getItem('coins') || 0;
            document.getElementById('historyBalance').innerText = parseInt(balance).toLocaleString();

            // Fetching data
            let transactions = JSON.parse(localStorage.getItem('userTransactions')) || [];

            // Add Welcome Bonus to History if it's new user
            if(localStorage.getItem('showBonus') === 'true') {
                transactions.push({
                    type: 'earn',
                    title: 'Welcome Bonus',
                    amount: 500,
                    date: new Date().toLocaleDateString(),
                    icon: 'fa-gift'
                });
                localStorage.removeItem('showBonus'); // Sirf ek baar dikhane ke liye
                localStorage.setItem('userTransactions', JSON.stringify(transactions));
            }

            if (transactions.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center mt-24 opacity-20">
                        <i class="fas fa-receipt text-7xl mb-4"></i>
                        <p class="text-[10px] font-black uppercase tracking-[0.3em]">No Activity Logged Yet</p>
                    </div>`;
                return;
            }

            // Latest first
            transactions = transactions.reverse();

            let htmlContent = '';
            
            transactions.forEach((tr, index) => {
                // Determine icon based on title if not present
                let displayIcon = tr.icon || 'fa-bolt';
                if(tr.title.includes('Refer')) displayIcon = 'fa-users';
                if(tr.title.includes('Vault')) displayIcon = 'fa-lock';
                if(tr.title.includes('Bonus')) displayIcon = 'fa-gift';

                htmlContent += `
                    <div class="trans-card p-4 flex items-center justify-between shadow-lg border-l-4 ${tr.type === 'earn' ? 'border-green-500' : 'border-red-500'}">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center ${tr.type === 'earn' ? 'text-green-500' : 'text-red-400'}">
                                <i class="fas ${displayIcon}"></i>
                            </div>
                            <div>
                                <h4 class="text-white font-bold text-[11px] uppercase tracking-tight">${tr.title}</h4>
                                <p class="text-[8px] text-gray-500 font-bold mt-0.5">${tr.date}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-sm ${tr.type === 'earn' ? 'plus' : 'minus'}">
                                ${tr.type === 'earn' ? '+' : '-'}${tr.amount}
                            </p>
                            <p class="text-[7px] text-gray-600 font-bold uppercase">Coins</p>
                        </div>
                    </div>
                `;

                // Ad Banner after every 5 entries
                if ((index + 1) % 5 === 0) {
                    htmlContent += `
                        <div class="ad-slot px-4">
                            <i class="fas fa-ad mr-3 opacity-30"></i>
                            <span>Premium Sponsored Slot</span>
                        </div>
                    `;
                }
            });

            container.innerHTML = htmlContent;
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
