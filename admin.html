<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinPotli - Admin Control Panel</title>
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; margin: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .stats-box { display: flex; gap: 20px; margin: 20px 0; }
        .stat-card { background: #1e1e1e; padding: 15px; border-radius: 8px; flex: 1; text-align: center; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #ffcc00; color: #000; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-ban { background: #ff4444; color: white; }
        .btn-unban { background: #00c851; color: white; }
        .banned-row { opacity: 0.4; background: #2a1b1b !important; }
        #adminAuthBlock { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <!-- Security Check Screen -->
    <div id="adminAuthBlock">
        <h2>Verifying Admin Clearance...</h2>
        <p>Checking security tokens...</p>
    </div>

    <!-- Main Dashboard Hidden by Default -->
    <div id="adminDashboard" style="display: none;">
        <div class="header">
            <h1>CoinPotli Admin Dashboard 👑</h1>
            <button class="btn btn-ban" onclick="logoutAdmin()">Logout</button>
        </div>

        <!-- Real-Time Counter Cards -->
        <div class="stats-box">
            <div class="stat-card"><h3>Total Players</h3><h2 id="totalUsers">0</h2></div>
            <div class="stat-card"><h3>Total Economy (Coins)</h3><h2 id="totalCoins">0</h2></div>
            <div class="stat-card"><h3>Banned Bots</h3><h2 id="bannedCount">0</h2></div>
        </div>

        <h2>Live User Management (Real-Time)</h2>
        <table>
            <thead>
                <tr>
                    <th>Username / UID</th>
                    <th>Coins Balance</th>
                    <th>Referral Code</th>
                    <th>Referred By</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                <!-- Data dynamically streams here -->
            </tbody>
        </table>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAJktqT5BuUFUqW6OC-TtVlAP9LhgbQodY",
    authDomain: "cpin-4cca9.firebaseapp.com",
    projectId: "cpin-4cca9",
    storageBucket: "cpin-4cca9.firebasestorage.app",
    messagingSenderId: "790141628965",
    appId: "1:790141628965:web:6e6a8d465a095c626585cc"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 1. Strict Security Route Guardian
auth.onAuthStateChanged(async (user) => {
    if (user) {
        // Database se verify karo ki kya yeh real admin hai
        const userDoc = await db.collection("users").doc(user.uid).get();
        if (userDoc.exists && userDoc.data().role === "admin") {
            document.getElementById("adminAuthBlock").style.display = "none";
            document.getElementById("adminDashboard").style.style.display = "block";
            listenToUserDatabase(); // Start streaming live updates
        } else {
            alert("ACCESS DENIED: You are not authorized to view this page.");
            window.location.href = "index.html"; 
        }
    } else {
        window.location.href = "index.html"; // No user logged in, kick out
    }
});

// 2. Real-Time Listener (Bina page refresh kiye sab automatic update hoga)
function listenToUserDatabase() {
    db.collection("users").onSnapshot((snapshot) => {
        const tbody = document.getElementById("usersTableBody");
        tbody.innerHTML = ""; // Clear current table view
        
        let totalUsers = 0;
        let totalCoins = 0;
        let bannedCount = 0;

        snapshot.forEach((doc) => {
            const data = doc.data();
            if(data.role === "admin") return; // Skip showing admin in user list

            totalUsers++;
            totalCoins += Number(data.balance || 0);
            if(data.isBanned) bannedCount++;

            // Create Table Row
            const tr = document.createElement("tr");
            if(data.isBanned) tr.className = "banned-row";

            // Anti-Cheat Highlight: Agar kisi ka balance abnormal high ho (e.g. > 50000) toh warning visual do
            const abnormalStyle = data.balance > 50000 ? "color: #ffcc00; font-weight: bold;" : "";

            tr.innerHTML = `
                <td>
                    <strong>${data.username || 'N/A'}</strong><br>
                    <small style="color: #888; font-size: 11px;">${doc.id}</small>
                </td>
                <td style="${abnormalStyle}">${data.balance || 0}</td>
                <td>${data.referral_code || 'N/A'}</td>
                <td>${data.referred_by || 'NONE'}</td>
                <td>
                    ${data.isBanned ? 
                        `<button class="btn btn-unban" onclick="toggleBan('${doc.id}', false)">UNBAN</button>` : 
                        `<button class="btn btn-ban" onclick="toggleBan('${doc.id}', true)">BAN BOT</button>`
                    }
                </td>
            `;
            tbody.appendChild(tr);
        });

        // Update Stat Cards dynamically
        document.getElementById("totalUsers").innerText = totalUsers;
        document.getElementById("totalCoins").innerText = totalCoins;
        document.getElementById("bannedCount").innerText = bannedCount;
    });
}

// 3. Ban / Unban System Logic
async function toggleBan(userId, banState) {
    const confirmAction = confirm(`Are you sure you want to ${banState ? 'BAN' : 'UNBAN'} this user?`);
    if(confirmAction) {
        try {
            await db.collection("users").doc(userId).update({
                isBanned: banState
            });
        } catch (error) {
            alert("Error updating ban status: " + error.message);
        }
    }
}

function logoutAdmin() {
    auth.signOut();
}
</script>
</body>
</html>
