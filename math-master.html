<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Master - CoinPotli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a192f; font-family: 'Segoe UI', sans-serif; color: #f1f1f1; overflow: hidden; height: 100vh; }
        .royal-card { background: linear-gradient(145deg, #112240, #0a192f); border: 1px solid rgba(212,175,55,0.2); }
        .gold-text { color: #d4af37; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f1d572 50%, #aa8a2e 100%); color: #0a192f; }
        .option-btn { background: rgba(17, 34, 64, 0.8); border: 1px solid rgba(255,255,255,0.05); transition: 0.1s; }
        .option-btn:active { background: #d4af37; color: #0a192f; transform: scale(0.95); }
        .ad-banner { height: 45px; background: rgba(17,34,64,0.5); border: 1px dashed rgba(212,175,55,0.2); display: flex; align-items: center; justify-content: center; font-size: 9px; color: #4b5563; border-radius: 12px; margin-bottom: 12px; }
        #endPopup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .verify-bar { height: 4px; background: rgba(212,175,55,0.1); width: 100%; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .verify-progress { height: 100%; background: #d4af37; width: 0%; transition: linear; }
        .pulse-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 4px; animation: pulse 1.5s infinite; box-shadow: 0 0 8px #22c55e; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col p-4">

    <nav class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
            <button onclick="window.location.href='games.html'" class="text-white text-lg"><i class="fas fa-arrow-left"></i></button>
            <h1 class="text-base font-black uppercase gold-text italic tracking-tighter">Math Master</h1>
        </div>
        <div class="bg-white/5 px-3 py-1 rounded-xl border border-white/10 flex flex-col items-end">
            <div class="flex items-center gap-1">
                <span class="pulse-dot"></span>
                <p class="text-[7px] font-black text-green-500 uppercase tracking-widest">Server Active</p>
            </div>
            <p id="livePlayers" class="text-[10px] font-black gold-text tracking-tighter">84,291 Online</p>
        </div>
    </nav>

    <div class="ad-banner font-black uppercase tracking-widest"><i class="fas fa-ad mr-2"></i> Sponsored Ad</div>

    <div class="flex justify-between items-center px-1 mb-3">
        <div class="text-center">
            <p class="text-[8px] font-bold text-gray-500 uppercase">Step</p>
            <p class="gold-text text-xs font-black"><span id="qCount">1</span>/20</p>
        </div>
        <div class="bg-white/5 px-4 py-1 rounded-full border border-white/10">
            <p id="gameTimer" class="text-lg font-black text-white leading-none">60s</p>
        </div>
        <div class="text-center">
            <p class="text-[8px] font-bold text-gray-500 uppercase">Correct</p>
            <p id="scoreCount" class="text-green-500 text-xs font-black">0</p>
        </div>
    </div>

    <div class="royal-card rounded-[2rem] flex-1 flex items-center justify-center mb-4 min-h-[140px]">
        <h2 id="question" class="text-6xl font-black tracking-tighter text-white">--</h2>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-2">
        <button onclick="checkAnswer(this)" class="option-btn py-6 rounded-2xl font-black text-2xl text-white shadow-lg">?</button>
        <button onclick="checkAnswer(this)" class="option-btn py-6 rounded-2xl font-black text-2xl text-white shadow-lg">?</button>
        <button onclick="checkAnswer(this)" class="option-btn py-6 rounded-2xl font-black text-2xl text-white shadow-lg">?</button>
        <button onclick="checkAnswer(this)" class="option-btn py-6 rounded-2xl font-black text-2xl text-white shadow-lg">?</button>
    </div>

    <div id="endPopup">
        <div class="w-full max-w-xs royal-card p-8 rounded-[3rem] text-center border-2 border-gold-btn/30">
            <i class="fas fa-trophy gold-text text-4xl mb-3"></i>
            <h2 class="text-xl font-black uppercase">Mission End</h2>
            <div class="my-5 bg-white/5 py-4 rounded-3xl border border-white/5">
                <p id="finalCoins" class="text-5xl font-black gold-text">0</p>
                <p class="text-[9px] font-bold text-gray-400 uppercase">Coins Won</p>
                <div id="verifyArea" class="px-6 mt-3">
                    <div class="verify-bar"><div id="vProgress" class="verify-progress"></div></div>
                    <p class="text-[7px] text-gray-500 uppercase mt-2 font-black tracking-widest">Syncing with Potli...</p>
                </div>
            </div>
            <div id="stakeSection" class="hidden mb-4">
                <div class="bg-green-500/10 border border-green-500/20 p-3 rounded-2xl mb-2">
                    <p class="text-[8px] text-green-500 font-black uppercase italic">🔥 1000+ Coins! Stake now to unlock more coins!</p>
                </div>
                <button onclick="window.location.href='stake.html'" class="w-full bg-green-500 text-white py-3 rounded-xl font-black uppercase text-[10px]">Stake Now</button>
            </div>
            <div id="actionBtns" class="hidden space-y-2">
                <button onclick="location.reload()" class="w-full gold-btn py-4 rounded-xl font-black uppercase text-xs">Play Again</button>
                <button onclick="window.location.href='games.html'" class="w-full bg-white/5 text-white py-3 rounded-xl font-black uppercase text-[10px] border border-white/10">Back</button>
            </div>
        </div>
    </div>

    <script>
        let correctAnswer, score = 0, qCount = 1, gameActive = true, timeLeft = 60;

        function updateLiveStats() {
            const base = 75000;
            const random = Math.floor(Math.random() * 25000);
            document.getElementById('livePlayers').innerText = `${(base + random).toLocaleString()} Online`;
        }
        setInterval(updateLiveStats, 3000);

        function startTimer() {
            let timer = setInterval(() => {
                if(!gameActive) { clearInterval(timer); return; }
                timeLeft--;
                document.getElementById('gameTimer').innerText = timeLeft + 's';
                if(timeLeft <= 0) endGame();
            }, 1000);
        }

        function generateQuestion() {
            if(qCount > 20) { endGame(); return; }
            document.getElementById('qCount').innerText = qCount;
            const isPlus = Math.random() > 0.5;
            const n1 = Math.floor(Math.random() * 80) + 20; 
            const n2 = Math.floor(Math.random() * 20) + 5;
            correctAnswer = isPlus ? n1 + n2 : n1 - n2;
            document.getElementById('question').innerText = `${n1}${isPlus?'+':'-'}${n2}`;
            let options = [correctAnswer];
            while(options.length < 4) {
                let r = correctAnswer + (Math.floor(Math.random() * 10) - 5);
                if(!options.includes(r) && r > 0) options.push(r);
            }
            options.sort(() => Math.random() - 0.5);
            document.querySelectorAll('button.option-btn').forEach((btn, i) => { btn.innerText = options[i]; });
        }

        function checkAnswer(btn) {
            if(!gameActive) return;
            if(parseInt(btn.innerText) === correctAnswer) score++;
            document.getElementById('scoreCount').innerText = score;
            qCount++;
            generateQuestion();
        }

        function endGame() {
            gameActive = false;
            const win = score * 5;
            document.getElementById('endPopup').style.display = 'flex';
            document.getElementById('finalCoins').innerText = win;
            let progress = document.getElementById('vProgress');
            progress.style.transition = "5s linear";
            setTimeout(() => progress.style.width = "100%", 50);
            setTimeout(() => {
                saveData(win);
                document.getElementById('verifyArea').classList.add('hidden');
                document.getElementById('actionBtns').classList.remove('hidden');
                let currentTotal = parseInt(localStorage.getItem('coins')) || 0;
                if(currentTotal >= 1000) document.getElementById('stakeSection').classList.remove('hidden');
            }, 5050);
        }

        function saveData(win) {
            let current = (parseInt(localStorage.getItem('coins')) || 0) + win;
            localStorage.setItem('coins', current);
            let log = JSON.parse(localStorage.getItem('userTransactions')) || [];
            log.push({type:'earn', title:'Math Master', amount:win, date:new Date().toLocaleDateString(), icon:'fa-brain'});
            localStorage.setItem('userTransactions', JSON.stringify(log));
        }

        window.onload = () => { updateLiveStats(); generateQuestion(); startTimer(); };
    </script>
</body>
</html>
